services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gitplane
      POSTGRES_USER: gitplane
      POSTGRES_PASSWORD: gitplane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gitplane:gitplane@postgres:5432/gitplane?sslmode=disable
      GITPLANE_JWT_SECRET: dev-secret-change-in-production
      PORT: "8080"
    depends_on:
      - postgres

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  pgdata:
